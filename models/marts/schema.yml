version: 2

models:
  - name: int_sales_margin
    description: "Joined sales, product and shipping data with margin calculations"
    columns:
      - name: orders_id
        description: "Order identifier."
        tests:
          - not_null

      - name: products_id
        description: "Product identifier."
        tests:
          - not_null

      - name: date_date
        description: "Transaction date."

      - name: revenue
        description: "Revenue amount."

      - name: quantity
        description: "Quantity sold."

      - name: purchase_price
        description: "Product purchase price."

      - name: shipping_fee
        description: "Shipping fee."

      - name: log_cost
        description: "Logistics cost."

      - name: ship_cost
        description: "Shipping cost."

      - name: purchase_cost
        description: "Quantity multiplied by purchase price."

      - name: margin
        description: "Revenue minus purchase cost."

      - name: operational_margin
        description: "Margin after subtracting shipping and logistics costs."