version: 2

sources:
  - name: raw
    description: "Raw dataset copied from BigQuery for the dbt project."
    database: workintech-working
    schema: gwz_raw_data
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: "Raw sales transactions data."
        config:
          loaded_at_field: "timestamp(date_date)"
          freshness:
            warn_after: {count: 90, period: day}
        columns:
          - name: date_date
            description: "Transaction date."
          - name: orders_id
            description: "Order identifier."
          - name: pdt_id
            description: "Product identifier in the raw sales table."
          - name: revenue
            description: "Revenue generated by the order."
          - name: quantity
            description: "Quantity sold."

      - name: product
        identifier: raw_gz_product
        description: "Raw product reference data."
        columns:
          - name: products_id
            description: "Product identifier."
          - name: purchse_PRICE
            description: "Raw purchase price column."

      - name: ship
        identifier: raw_gz_ship
        description: "Raw shipping cost data."
        columns:
          - name: orders_id
            description: "Order identifier."
          - name: shipping_fee
            description: "Shipping fee."
          - name: shipping_fee_1
            description: "Alternative shipping fee column to compare with shipping_fee."
          - name: logCost
            description: "Logistics cost."
          - name: ship_cost
            description: "Shipping cost."

      - name: adwords
        identifier: raw_gz_adwords
        description: "Raw Google Adwords campaign performance data."
        columns:
          - name: date_date
            description: "Campaign performance date."
          - name: paid_source
            description: "Paid media source."
          - name: campaign_key
            description: "Campaign identifier."
          - name: camPGN_name
            description: "Raw campaign name field."
          - name: ads_cost
            description: "Advertising cost stored in raw format."
          - name: impression
            description: "Number of ad impressions."
          - name: click
            description: "Number of ad clicks."

      - name: bing
        identifier: raw_gz_bing
        description: "Raw Bing campaign performance data."
        columns:
          - name: date_date
            description: "Campaign performance date."
          - name: paid_source
            description: "Paid media source."
          - name: campaign_key
            description: "Campaign identifier."
          - name: camPGN_name
            description: "Raw campaign name field."
          - name: ads_cost
            description: "Advertising cost stored in raw format."
          - name: impression
            description: "Number of ad impressions."
          - name: click
            description: "Number of ad clicks."

      - name: criterio
        identifier: raw_gz_criterio
        description: "Raw Criteo campaign performance data."
        columns:
          - name: date_date
            description: "Campaign performance date."
          - name: paid_source
            description: "Paid media source."
          - name: campaign_key
            description: "Campaign identifier."
          - name: camPGN_name
            description: "Raw campaign name field."
          - name: ads_cost
            description: "Advertising cost stored in raw format."
          - name: impression
            description: "Number of ad impressions."
          - name: click
            description: "Number of ad clicks."

      - name: facebook
        identifier: raw_gz_facebook
        description: "Raw Facebook campaign performance data."
        columns:
          - name: date_date
            description: "Campaign performance date."
          - name: paid_source
            description: "Paid media source."
          - name: campaign_key
            description: "Campaign identifier."
          - name: camPGN_name
            description: "Raw campaign name field."
          - name: ads_cost
            description: "Advertising cost stored in raw format."
          - name: impression
            description: "Number of ad impressions."
          - name: click
            description: "Number of ad clicks."

models:
  - name: stg_raw__sales
    description: "Cleaned sales data from raw source."
    tests:
      - unique:
          column_name: "concat(cast(orders_id as string), '-', cast(products_id as string))"
    columns:
      - name: date_date
        description: "Transaction date."
      - name: orders_id
        description: "Order identifier."
        tests:
          - not_null
      - name: products_id
        description: "Renamed product identifier from pdt_id."
        tests:
          - not_null
      - name: revenue
        description: "Revenue amount."
      - name: quantity
        description: "Sold quantity."

  - name: stg_raw__product
    description: "Cleaned product data from raw source."
    columns:
      - name: products_id
        description: "Product identifier."
        tests:
          - unique
          - not_null
      - name: purchase_price
        description: "Renamed and cast purchase price."

  - name: stg_raw__ship
    description: "Cleaned shipping data from raw source."
    columns:
      - name: orders_id
        description: "Order identifier."
        tests:
          - unique
          - not_null
      - name: shipping_fee
        description: "Selected shipping fee column kept after comparing raw shipping fields."
      - name: log_cost
        description: "Logistics cost."
      - name: ship_cost
        description: "Shipping cost."

  - name: stg_raw_adwords
    description: "Cleaned Adwords campaign data with standardized column names and types."
    tests:
      - unique:
          column_name: "concat(cast(date_date as string), '-', paid_source, '-', cast(campaign_key as string))"
    columns:
      - name: date_date
        description: "Campaign performance date."
        tests:
          - not_null
      - name: paid_source
        description: "Advertising source name."
        tests:
          - not_null
      - name: campaign_key
        description: "Campaign identifier."
        tests:
          - not_null
      - name: campaign_name
        description: "Renamed campaign name from camPGN_name."
      - name: ads_cost
        description: "Advertising cost cast to float64."
      - name: impression
        description: "Number of impressions."
      - name: click
        description: "Number of clicks."

  - name: stg_raw_bing
    description: "Cleaned Bing campaign data with standardized column names and types."
    tests:
      - unique:
          column_name: "concat(cast(date_date as string), '-', paid_source, '-', cast(campaign_key as string))"
    columns:
      - name: date_date
        description: "Campaign performance date."
        tests:
          - not_null
      - name: paid_source
        description: "Advertising source name."
        tests:
          - not_null
      - name: campaign_key
        description: "Campaign identifier."
        tests:
          - not_null
      - name: campaign_name
        description: "Renamed campaign name from camPGN_name."
      - name: ads_cost
        description: "Advertising cost cast to float64."
      - name: impression
        description: "Number of impressions."
      - name: click
        description: "Number of clicks."

  - name: stg_raw_criterio
    description: "Cleaned Criteo campaign data with standardized column names and types."
    tests:
      - unique:
          column_name: "concat(cast(date_date as string), '-', paid_source, '-', cast(campaign_key as string))"
    columns:
      - name: date_date
        description: "Campaign performance date."
        tests:
          - not_null
      - name: paid_source
        description: "Advertising source name."
        tests:
          - not_null
      - name: campaign_key
        description: "Campaign identifier."
        tests:
          - not_null
      - name: campaign_name
        description: "Renamed campaign name from camPGN_name."
      - name: ads_cost
        description: "Advertising cost cast to float64."
      - name: impression
        description: "Number of impressions."
      - name: click
        description: "Number of clicks."

  - name: stg_raw_facebook
    description: "Cleaned Facebook campaign data with standardized column names and types."
    tests:
      - unique:
          column_name: "concat(cast(date_date as string), '-', paid_source, '-', cast(campaign_key as string))"
    columns:
      - name: date_date
        description: "Campaign performance date."
        tests:
          - not_null
      - name: paid_source
        description: "Advertising source name."
        tests:
          - not_null
      - name: campaign_key
        description: "Campaign identifier."
        tests:
          - not_null
      - name: campaign_name
        description: "Renamed campaign name from camPGN_name."
      - name: ads_cost
        description: "Advertising cost cast to float64."
      - name: impression
        description: "Number of impressions."
      - name: click
        description: "Number of clicks."