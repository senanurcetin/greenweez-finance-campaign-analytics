version: 2

models:
  - name: finance_days
    description: "Daily financial metrics for business reporting, aggregated at date level."
    columns:
      - name: date_date
        description: "Date of transactions."
        tests:
          - not_null
          - unique

      - name: total_transactions
        description: "Total number of orders per day."

      - name: total_revenue
        description: "Total revenue generated per day."

      - name: avg_basket
        description: "Average basket value per day (total revenue divided by number of orders)."

      - name: operational_margin
        description: "Total operational margin per day."

      - name: total_purchase_cost
        description: "Total purchase cost per day."

      - name: total_shipping_fee
        description: "Total shipping fees paid by customers per day."

      - name: total_log_cost
        description: "Total logistics costs per day."

      - name: total_quantity
        description: "Total quantity of products sold per day."